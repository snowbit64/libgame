name: Ghidra Pseudo-C Extractor

on:
  push:
    paths:
      - 'libgame.so'
  workflow_dispatch:

jobs:
  decompile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y wget unzip

      - name: Download Ghidra
        run: |
          GHIDRA_VERSION="11.0.3"
          GHIDRA_ZIP="ghidra_${GHIDRA_VERSION}_PUBLIC_20240410.zip"
          wget -q https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_${GHIDRA_VERSION}_build/$GHIDRA_ZIP
          unzip -q $GHIDRA_ZIP
          echo "GHIDRA_PATH=$PWD/ghidra_${GHIDRA_VERSION}_PUBLIC" >> $GITHUB_ENV

      - name: Create Decompiler Script
        run: |
          cat > decompile.py << 'EOF'
          from ghidra.app.decompiler import DecompInterface
          from ghidra.util.task import ConsoleTaskMonitor
          import os

          program = currentProgram
          output_dir = "pseudo_c_output"
          if not os.path.exists(output_dir):
              os.makedirs(output_dir)

          decomp_interface = DecompInterface()
          decomp_interface.openProgram(program)

          # Força a obtenção de todas as funções, mesmo as inferidas pela análise
          fm = program.getFunctionManager()
          functions = fm.getFunctions(True)
          
          count = 0
          for func in functions:
              if func.isThunk(): continue
              
              # Timeout de 30s para não travar o workflow
              results = decomp_interface.decompileFunction(func, 30, ConsoleTaskMonitor())
              
              if results and results.decompileCompleted():
                  count += 1
                  addr = func.getEntryPoint()
                  # Nome limpo para evitar erros de sistema de arquivo
                  clean_name = "".join([c for c in func.getName() if c.isalnum() or c == '_'])
                  filename = "{}_{}.c".format(addr, clean_name)
                  
                  with open(os.path.join(output_dir, filename), "w") as f:
                      f.write(results.getDecompiledFunction().getC())
          
          print("Sucesso: {} funções descompiladas.".format(count))
          EOF

      - name: Run Ghidra Headless
        run: |
          # Aumenta a memória para evitar o erro 143 (OOM)
          export _JAVA_OPTIONS="-Xmx6G -Xms2G"
          
          # IMPORTANTE: Removido o -noanalysis para que o Ghidra use 
          # seus analisadores para achar funções em binários stripped.
          $GHIDRA_PATH/support/analyzeHeadless \
              ./temp_project \
              ProjectName \
              -import libgame.so \
              -postScript decompile.py \
              -deleteProject \
              -collectItem "Decompiler Parameter ID"
        # O parâmetro -collectItem ajuda a melhorar a recuperação de nomes de variáveis

      - name: Zip Results
        if: always()
        run: |
          if [ -d "pseudo_c_output" ] && [ "$(ls -A pseudo_c_output)" ]; then
            zip -r libgame_pseudo_c.zip pseudo_c_output/
          else
            echo "Nenhuma função encontrada para zipar."
            exit 1
          fi

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libgame-source-code
          path: libgame_pseudo_c.zip
