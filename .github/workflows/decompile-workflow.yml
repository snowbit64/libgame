name: Decompile Stripped Library

on:
  push:
    paths:
      - 'libgame.so'
      - '.github/workflows/decompile-workflow.yml'
  workflow_dispatch:
    inputs:
      binary_path:
        description: 'Path to binary file'
        required: false
        default: 'libgame.so'

jobs:
  decompile:
    runs-on: ubuntu-latest
    permissions: # Necessário para criar Releases e comentar em PRs
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip binutils readelf objdump nm radare2

      - name: Download Ghidra
        run: |
          GHIDRA_VERSION="11.0.3"
          # Link direto e estável
          wget -q https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_${GHIDRA_VERSION}_build/ghidra_${GHIDRA_VERSION}_PUBLIC_20240410.zip
          unzip -q ghidra_${GHIDRA_VERSION}_PUBLIC_20240410.zip
          echo "GHIDRA_PATH=$PWD/ghidra_${GHIDRA_VERSION}_PUBLIC" >> $GITHUB_ENV

      - name: Analyze binary structure
        run: |
          mkdir -p analysis_report
          FILE_PATH="${{ github.event.inputs.binary_path || 'libgame.so' }}"
          echo "FILE_PATH=$FILE_PATH" >> $GITHUB_ENV
          
          echo "=== Binary Information ===" > analysis_report/binary_info.txt
          file "$FILE_PATH" >> analysis_report/binary_info.txt
          readelf -h "$FILE_PATH" >> analysis_report/binary_info.txt
          
          echo "=== Exported Functions ===" >> analysis_report/binary_info.txt
          nm -D "$FILE_PATH" || echo "No dynamic symbols" >> analysis_report/binary_info.txt

      - name: Create Ghidra decompilation script
        run: |
          cat > decompile_script.py << 'EOF'
          from ghidra.app.decompiler import DecompInterface
          from ghidra.util.task import ConsoleTaskMonitor
          import os

          # Configurar Decompilador
          program = currentProgram
          decomp_interface = DecompInterface()
          decomp_interface.openProgram(program)

          output_dir = "decompiled_functions"
          if not os.path.exists(output_dir):
              os.makedirs(output_dir)

          # Obter funções (Ghidra precisa ter analisado para popular isso)
          functions = program.getFunctionManager().getFunctions(True)
          
          count = 0
          for func in functions:
              # Ignorar funções externas/thunks se desejar
              if func.isThunk():
                  continue
                  
              results = decomp_interface.decompileFunction(func, 0, ConsoleTaskMonitor())
              if results.decompileCompleted():
                  count += 1
                  clean_name = func.getName().replace('<', '').replace('>', '')
                  filename = "{}_{}.c".format(func.getEntryPoint(), clean_name)
                  with open(os.path.join(output_dir, filename), "w") as f:
                      f.write(results.getDecompiledFunction().getC())
          
          print("Decompiladas {} funções.".format(count))
          EOF

      - name: Run Ghidra headless decompilation
        run: |
          # Aumentar memória para o Java (importante para arquivos .so grandes)
          export _JAVA_OPTIONS="-Xmx4G"
          
          mkdir -p ghidra_project
          
          # Removido o -noanalysis para permitir que o Ghidra identifique funções em arquivos stripped
          $GHIDRA_PATH/support/analyzeHeadless \
              ./ghidra_project \
              TempProject \
              -import "${{ env.FILE_PATH }}" \
              -postScript decompile_script.py \
              -deleteProject \
              -analysisTimeoutPerFile 3600

      - name: Fallback Radare2
        if: always()
        run: |
          if [ ! -d "decompiled_functions" ] || [ -z "$(ls -A decompiled_functions)" ]; then
            echo "Ghidra falhou ou não encontrou funções. Usando Radare2..."
            mkdir -p radare2_analysis
            r2 -qc "aaa; afl" "${{ env.FILE_PATH }}" > radare2_analysis/functions.txt
            r2 -qc "aaa; iz" "${{ env.FILE_PATH }}" > radare2_analysis/strings.txt
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: decompilation-results
          path: |
            decompiled_functions/
            radare2_analysis/
            analysis_report/

